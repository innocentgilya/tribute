<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gallery — Dr. Philemon Odiwuor Yugi</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,200;0,300;0,400;0,500;0,600;1,200;1,300&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal:        #1a3a4a;
    --teal-deep:   #0d2535;
    --teal-mid:    #1e4a5c;
    --teal-light:  #2a6070;
    --accent:      #7ab8c8;
    --accent-soft: #b0d8e4;
    --dark:        #091820;
    --surface:     #102030;
    --card:        #152535;
    --border:      rgba(122,184,200,0.25);
    --text:        #dff0f5;
    --muted:       #7a9eaa;
    --white:       #f0f8fa;
    --nav-h:       64px;
  }

  html { scroll-behavior: smooth; }

  body {
    background-color: var(--dark);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ====== NAV ====== */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--nav-h); z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px;
    background: rgba(9,24,32,0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .nav-brand {
    font-size: 0.85rem; font-weight: 500; letter-spacing: 1px;
    color: var(--accent-soft); white-space: nowrap; flex-shrink: 0; text-decoration: none;
  }
  .nav-links { display: flex; align-items: center; gap: 36px; list-style: none; }
  .nav-links a {
    font-size: 0.72rem; letter-spacing: 2px; color: var(--muted);
    text-decoration: none; text-transform: uppercase;
    transition: color 0.3s; position: relative; padding-bottom: 4px; font-weight: 300;
  }
  .nav-links a::after {
    content: ''; position: absolute; bottom: 0; left: 0;
    width: 0; height: 1px; background: var(--accent); transition: width 0.3s;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--accent); }
  .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
  .nav-toggle {
    display: none; flex-direction: column; gap: 5px;
    cursor: pointer; background: none; border: none; padding: 4px;
  }
  .nav-toggle span { display: block; width: 22px; height: 1px; background: var(--accent); transition: all 0.3s; }
  .nav-toggle.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
  .nav-toggle.open span:nth-child(2) { opacity: 0; }
  .nav-toggle.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
  @media (max-width: 680px) {
    nav { padding: 0 20px; }
    .nav-toggle { display: flex; }
    .nav-links {
      display: none; position: absolute; top: var(--nav-h); left: 0; right: 0;
      flex-direction: column; gap: 0; background: rgba(9,24,32,0.98);
      border-bottom: 1px solid var(--border); padding: 12px 0 20px;
    }
    .nav-links.open { display: flex; }
    .nav-links li { width: 100%; text-align: center; }
    .nav-links a { display: block; padding: 14px 20px; font-size: 0.7rem; }
    .nav-links a::after { display: none; }
  }

  /* ====== PARTICLES ====== */
  #particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.4; }

  /* ====== SECTION BASE ====== */
  .section-label {
    font-size: 0.65rem; letter-spacing: 3px;
    text-transform: uppercase; text-align: center; margin-bottom: 12px; font-weight: 400;
  }
  .section-title {
    font-size: clamp(1.5rem, 4vw, 2.2rem); font-weight: 500;
    text-align: center; margin-bottom: 48px; letter-spacing: 1px;
  }

  /* ====== GALLERY SLIDESHOW ====== */
  #slideshow {
    position: relative; z-index: 1;
    background: #ffffff;
    padding: 80px 0;
    scroll-margin-top: var(--nav-h);
    margin-top: var(--nav-h);
  }
  #slideshow > * {
    max-width: 1060px;
    margin-left: auto; margin-right: auto;
    padding-left: 24px; padding-right: 24px;
  }
  #slideshow .section-label { color: var(--teal-light); }
  #slideshow .section-title { color: var(--teal-deep); }
  #slideshow .slide-btn     { border-color: rgba(26,58,74,0.3); color: var(--teal-mid); }
  #slideshow .slide-btn:hover { background: rgba(26,58,74,0.08); border-color: var(--teal-mid); }
  #slideshow .dot            { background: rgba(26,58,74,0.25); }
  #slideshow .dot.active     { background: var(--teal-mid); }

  .slideshow-wrapper {
    width: 100%; max-width: 720px; margin: 0 auto 20px;
    border-radius: 6px; overflow: hidden;
    box-shadow: 0 0 80px rgba(0,0,0,0.15), 0 0 0 1px rgba(26,58,74,0.15);
  }
  .slideshow-stage { position: relative; width: 100%; padding-top: 62%; background: #e8f0f4; }
  .slide {
    position: absolute; inset: 0; opacity: 0; transition: opacity 1.2s ease;
    display: flex; align-items: center; justify-content: center;
  }
  .slide.active { opacity: 1; }
  .slide img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .slideshow-controls {
    display: flex; align-items: center; justify-content: center;
    gap: 20px; margin-top: 20px;
  }
  .slide-btn {
    background: transparent; border: 1px solid var(--border); color: var(--accent);
    width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1rem;
    transition: all 0.3s; display: flex; align-items: center; justify-content: center;
  }
  .slide-btn:hover { background: rgba(122,184,200,0.12); border-color: var(--accent); }
  .slide-dots { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 200px; }
  .dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--muted);
    cursor: pointer; transition: all 0.3s; flex-shrink: 0;
  }
  .dot.active { background: var(--accent); transform: scale(1.3); }

  /* ====== FOOTER ====== */
  footer {
    text-align: center; padding: 48px 24px;
    border-top: 1px solid var(--border); position: relative; z-index: 1;
  }
  .footer-text { font-weight: 300; color: var(--muted); font-size: 0.9rem; letter-spacing: 1px; font-style: italic; }
  .footer-name { font-weight: 500; color: var(--accent); font-size: 0.82rem; letter-spacing: 2px; margin-top: 12px; text-transform: uppercase; }

  /* ====== ANIMATIONS ====== */
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
</style>
</head>
<body>

<!-- ===== NAV ===== -->
<nav id="navbar">
  <a class="nav-brand" href="index.html">In Loving Memory</a>
  <ul class="nav-links" id="nav-links">
    <li><a href="index.html"    class="nav-link">Home</a></li>
    <li><a href="gallery.html"  class="nav-link active">Gallery</a></li>
    <li><a href="tributes.html" class="nav-link">Tributes</a></li>
  </ul>
  <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<canvas id="particles"></canvas>

<!-- ===== GALLERY SLIDESHOW ===== -->
<section id="slideshow">
  <p class="section-label">✦ Gallery</p>
  <h2 class="section-title">A Life Beautifully Lived</h2>
  <div class="slideshow-wrapper">
    <div class="slideshow-stage" id="stage"></div>
  </div>
  <div class="slideshow-controls">
    <button class="slide-btn" id="prev">&#8592;</button>
    <div class="slide-dots" id="dots"></div>
    <button class="slide-btn" id="next">&#8594;</button>
  </div>
</section>

<!-- ===== FOOTER ===== -->
<footer>
  <p class="footer-text">"Be of good comfort in the hope of the resurrection morning"</p>
  <p class="footer-name">Dr. Philemon Odiwuor Yugi &nbsp;✦&nbsp; May 25, 1968 – March 19, 2026</p>
</footer>

<script src="main.js"></script>
<script src="slideshow.js"></script>
</body>
</html>
