<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gallery — Dr. Philemon Odiwuor Yugi</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --dark:        #091820;
    --card:        #0f2030;
    --accent:      #7ab8c8;
    --accent-soft: #b0d8e4;
    --border:      rgba(122,184,200,0.2);
    --text:        #dff0f5;
    --muted:       #6a8e9a;
    --white:       #f0f8fa;
    --nav-h:       64px;
    --gold:        #c9a96e;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--dark); color: var(--text); font-family: 'Montserrat', sans-serif; font-weight: 300; min-height: 100vh; overflow-x: hidden; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--nav-h); z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 0 40px;
    background: rgba(9,24,32,0.94);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .nav-links { display: flex; gap: 36px; list-style: none; align-items: center; }
  .nav-links a {
    font-size: 0.68rem; letter-spacing: 2.5px; color: var(--muted);
    text-decoration: none; text-transform: uppercase; font-weight: 300;
    transition: color 0.3s; position: relative; padding-bottom: 4px;
  }
  .nav-links a::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 1px; background: var(--accent); transition: width 0.3s; }
  .nav-links a:hover, .nav-links a.active { color: var(--accent); }
  .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
  @media (max-width: 680px) { nav { padding: 0 16px; } .nav-links { gap: 20px; flex-wrap: wrap; justify-content: center; } }

  /* PAGE HEADER */
  .page-header { padding: calc(var(--nav-h) + 60px) 40px 52px; text-align: center; position: relative; }
  .page-header::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 1px; height: 36px; background: linear-gradient(to bottom, var(--accent), transparent); }
  .header-label { font-size: 0.62rem; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; font-weight: 400; margin-bottom: 16px; opacity: 0; animation: fadeUp 0.8s 0.1s ease forwards; }
  .header-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 5vw, 3.5rem); font-weight: 300; font-style: italic; color: var(--white); letter-spacing: 1px; line-height: 1.2; opacity: 0; animation: fadeUp 0.8s 0.25s ease forwards; }
  .header-sub { font-size: 0.7rem; letter-spacing: 2px; color: var(--muted); margin-top: 14px; opacity: 0; animation: fadeUp 0.8s 0.4s ease forwards; }
  .header-count { display: inline-block; margin-top: 22px; font-size: 0.6rem; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; font-weight: 400; border: 1px solid var(--border); border-radius: 20px; padding: 5px 18px; opacity: 0; animation: fadeUp 0.8s 0.55s ease forwards; }

  /* MASONRY GALLERY */
  .gallery-section { padding: 52px 28px 80px; max-width: 1400px; margin: 0 auto; }
  .masonry-grid { columns: 4; column-gap: 14px; }
  @media (max-width: 1200px) { .masonry-grid { columns: 3; } }
  @media (max-width: 800px)  { .masonry-grid { columns: 2; } }
  @media (max-width: 460px)  { .masonry-grid { columns: 1; } }
  .masonry-item { break-inside: avoid; margin-bottom: 14px; position: relative; border-radius: 4px; overflow: hidden; cursor: pointer; border: 1px solid var(--border); opacity: 0; transform: translateY(24px); transition: opacity 0.55s ease, transform 0.55s ease, border-color 0.3s; content-visibility: auto; contain-intrinsic-size: 300px; }
  .masonry-item picture, .masonry-item img { display: block; width: 100%; height: auto; }
  .masonry-item.visible { opacity: 1; transform: translateY(0); }
  .masonry-item:hover { border-color: rgba(122,184,200,0.5); }
  .masonry-item img { width: 100%; display: block; transition: transform 0.65s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.4s ease; filter: brightness(0.85) saturate(0.85); }
  .masonry-item:hover img { transform: scale(1.05); filter: brightness(1) saturate(1.1); }
  .masonry-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(9,24,32,0.82) 0%, rgba(9,24,32,0.1) 55%, transparent 100%); opacity: 0; transition: opacity 0.4s ease; display: flex; align-items: flex-end; justify-content: space-between; padding: 14px 16px; }
  .masonry-item:hover .masonry-overlay { opacity: 1; }
  .masonry-label { font-family: 'Cormorant Garamond', serif; font-size: 0.95rem; font-style: italic; color: var(--accent-soft); letter-spacing: 0.3px; }
  .masonry-zoom { width: 30px; height: 30px; border-radius: 50%; background: rgba(122,184,200,0.15); border: 1px solid rgba(122,184,200,0.4); display: flex; align-items: center; justify-content: center; color: var(--accent); flex-shrink: 0; }

  /* SHIMMER */
  .shimmer { background: linear-gradient(90deg, #0f2030 25%, #162c3e 50%, #0f2030 75%); background-size: 400% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; margin-bottom: 14px; break-inside: avoid; }
  @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

  /* EMPTY */
  .gallery-empty { text-align: center; padding: 80px 20px; grid-column: 1/-1; font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-style: italic; color: var(--muted); line-height: 1.9; }
  .gallery-empty strong { color: var(--accent-soft); font-weight: 400; }

  /* LIGHTBOX */
  .lightbox { position: fixed; inset: 0; z-index: 500; background: rgba(4,12,18,0.97); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.35s ease; }
  .lightbox.open { opacity: 1; pointer-events: all; }
  .lb-img-wrap { display: flex; align-items: center; justify-content: center; max-width: 90vw; max-height: 88vh; }
  .lb-img-wrap img { max-width: 88vw; max-height: 84vh; object-fit: contain; border-radius: 3px; box-shadow: 0 0 120px rgba(0,0,0,0.95); transform: scale(0.96); transition: transform 0.35s ease, opacity 0.2s ease; }
  .lightbox.open .lb-img-wrap img { transform: scale(1); }
  .lb-close { position: fixed; top: 20px; right: 24px; background: rgba(9,24,32,0.85); border: 1px solid var(--border); color: var(--accent); width: 40px; height: 40px; border-radius: 50%; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; z-index: 10; }
  .lb-close:hover { background: rgba(122,184,200,0.18); border-color: var(--accent); }
  .lb-nav { position: fixed; top: 50%; transform: translateY(-50%); background: rgba(9,24,32,0.75); border: 1px solid var(--border); color: var(--accent); width: 44px; height: 44px; border-radius: 50%; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; z-index: 10; }
  .lb-nav:hover { background: rgba(122,184,200,0.18); border-color: var(--accent); }
  #lb-prev { left: 18px; } #lb-next { right: 18px; }
  @media (max-width: 500px) { #lb-prev { left: 6px; } #lb-next { right: 6px; } }
  .lb-footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px 24px; text-align: center; background: linear-gradient(to top, rgba(4,12,18,0.9), transparent); }
  .lb-caption { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.05rem; color: var(--accent-soft); letter-spacing: 0.5px; }
  .lb-counter { font-size: 0.6rem; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-top: 6px; }

  /* FOOTER */
  footer { text-align: center; padding: 40px 24px; border-top: 1px solid var(--border); }
  .footer-quote { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1rem; color: var(--muted); letter-spacing: 0.5px; }
  .footer-name { font-size: 0.65rem; letter-spacing: 2.5px; color: var(--accent); text-transform: uppercase; font-weight: 400; margin-top: 10px; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>

<nav id="navbar">
  <ul class="nav-links" id="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="gallery.html" class="active">Gallery</a></li>
    <li><a href="biography.html">Biography</a></li>
    <li><a href="tributes.html">Tributes</a></li>
  </ul>
</nav>

<div class="page-header">
  <p class="header-label">✶ Photo Gallery</p>
  <h1 class="header-title">Memories &amp; Moments</h1>
  <p class="header-sub">Dr. Philemon Odiwuor Yugi &nbsp;&middot;&nbsp; May 25, 1968 – March 19, 2026</p>
  <span class="header-count" id="header-count">Loading…</span>
</div>

<div class="gallery-section">
  <div class="masonry-grid" id="masonry-grid">
    <div class="shimmer" style="height:220px"></div>
    <div class="shimmer" style="height:160px"></div>
    <div class="shimmer" style="height:280px"></div>
    <div class="shimmer" style="height:200px"></div>
    <div class="shimmer" style="height:240px"></div>
    <div class="shimmer" style="height:180px"></div>
    <div class="shimmer" style="height:260px"></div>
    <div class="shimmer" style="height:150px"></div>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close">&#10005;</button>
  <button class="lb-nav" id="lb-prev">&#8592;</button>
  <div class="lb-img-wrap"><img id="lb-img" src="" alt=""/></div>
  <button class="lb-nav" id="lb-next">&#8594;</button>
  <div class="lb-footer">
    <div class="lb-caption" id="lb-caption"></div>
    <div class="lb-counter" id="lb-counter"></div>
  </div>
</div>

<footer>
  <p class="footer-quote">"Be of good comfort in the hope of the resurrection morning"</p>
  <p class="footer-name">Dr. Philemon Odiwuor Yugi &nbsp;✶&nbsp; 1968 – 2026</p>
</footer>

<script>
(function () {
  const IMAGE_NAMES = ['hero','Drphilemonyugi','Drphilemonyugi2','Drphilemonyugi3','Drphilemonyugi4','Drphilemonyugi5','Drphilemonyugi6','Drphilemonyugi7','Drphilemonyugi8'];
  const FOLDERS = ['images/', 'Images/'];
  const EXTS    = ['.jpg','.jpeg','.JPG','.JPEG','.png','.PNG','.webp','.WEBP'];

  function formatName(n){ return n.replace(/([a-z])([A-Z])/g,'$1 $2').replace(/([^\d])(\d+)$/,'$1 $2').replace(/^\w/,function(c){return c.toUpperCase();}).trim(); }

  var grid=document.getElementById('masonry-grid');
  var countEl=document.getElementById('header-count');
  var found=[], lbIdx=0;

  /* ── Optimized image manifest with WebP + JPEG srcsets ── */
  var OPTIMIZED = [
    {
      name: 'Drphilemonyugi',
      webp: 'images/webp/Drphilemonyugi-1024w.webp',
      jpeg: 'images/jpeg/Drphilemonyugi-1024w.jpg',
      srcsetWebp: 'images/webp/Drphilemonyugi-480w.webp 480w, images/webp/Drphilemonyugi-768w.webp 768w, images/webp/Drphilemonyugi-1024w.webp 1024w',
      srcsetJpeg: 'images/jpeg/Drphilemonyugi-480w.jpg 480w, images/jpeg/Drphilemonyugi-768w.jpg 768w, images/jpeg/Drphilemonyugi-1024w.jpg 1024w',
    },
    {
      name: 'philemon',
      webp: 'images/webp/philemon-1024w.webp',
      jpeg: 'images/jpeg/philemon-1024w.jpg',
      srcsetWebp: 'images/webp/philemon-480w.webp 480w, images/webp/philemon-768w.webp 768w, images/webp/philemon-1024w.webp 1024w',
      srcsetJpeg: 'images/jpeg/philemon-480w.jpg 480w, images/jpeg/philemon-768w.jpg 768w, images/jpeg/philemon-1024w.jpg 1024w',
    }
  ];

  /* Also discover any additional images in images/ folder the old way */
  function discover(name) {
    return new Promise(function(resolve) {
      var folders=['images/','Images/'], exts=['.jpg','.jpeg','.JPG','.JPEG','.png','.PNG','.webp','.WEBP'];
      var fi=0,ei=0;
      function next() {
        if(fi>=folders.length){resolve(null);return;}
        if(ei>=exts.length){fi++;ei=0;next();return;}
        var src=folders[fi]+name+exts[ei];
        var img=new Image(); img.onload=function(){resolve(src);}; img.onerror=function(){ei++;next();}; img.src=src;
      }
      next();
    });
  }

  /* Render optimized images first */
  grid.innerHTML = '';
  countEl.textContent = OPTIMIZED.length + ' Photo' + (OPTIMIZED.length !== 1 ? 's' : '');

  OPTIMIZED.forEach(function(item, idx) {
    var label = formatName(item.name);
    var el = document.createElement('div');
    el.className = 'masonry-item';
    /* <picture> with WebP + JPEG fallback, srcset, lazy loading */
    el.innerHTML =
      '<picture>' +
        '<source type="image/webp" srcset="' + item.srcsetWebp + '" sizes="(max-width:480px) 480px, (max-width:768px) 768px, 1024px"/>' +
        '<img src="' + item.jpeg + '" srcset="' + item.srcsetJpeg + '" sizes="(max-width:480px) 480px, (max-width:768px) 768px, 1024px" alt="' + label + '" loading="lazy" decoding="async" width="1024"/>' +
      '</picture>' +
      '<div class="masonry-overlay"><span class="masonry-label">' + label + '</span><span class="masonry-zoom"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span></div>';
    el.addEventListener('click', function(){ openLB(idx); });
    grid.appendChild(el);
    found.push({ src: item.jpeg, label: label });
    observer.observe(el);
  });

  /* Also try to discover extra images (Drphilemonyugi2–8) */
  var EXTRA_NAMES = ['Drphilemonyugi2','Drphilemonyugi3','Drphilemonyugi4','Drphilemonyugi5','Drphilemonyugi6','Drphilemonyugi7','Drphilemonyugi8','hero'];
  Promise.all(EXTRA_NAMES.map(function(name){ return discover(name).then(function(src){return{name:name,src:src};}); }))
  .then(function(results){
    var valid = results.filter(function(r){ return r.src !== null; });
    if (!valid.length) return;
    countEl.textContent = (OPTIMIZED.length + valid.length) + ' Photos';
    valid.forEach(function(item, idx) {
      var label = formatName(item.name);
      var el = document.createElement('div');
      el.className = 'masonry-item';
      el.innerHTML =
        '<img src="' + item.src + '" alt="' + label + '" loading="lazy" decoding="async"/>' +
        '<div class="masonry-overlay"><span class="masonry-label">' + label + '</span><span class="masonry-zoom"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span></div>';
      var lbIndex = OPTIMIZED.length + idx;
      el.addEventListener('click', function(){ openLB(lbIndex); });
      grid.appendChild(el);
      found.push({ src: item.src, label: label });
      observer.observe(el);
    });
  });

  var delay=0;
  var observer=new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if(entry.isIntersecting){ var el=entry.target,d=delay; setTimeout(function(){el.classList.add('visible');},d); delay=Math.min(delay+55,280); observer.unobserve(el); }
    });
  },{threshold:0.06});

  var lb=document.getElementById('lightbox');
  var lbImg=document.getElementById('lb-img');
  var lbCap=document.getElementById('lb-caption');
  var lbCtr=document.getElementById('lb-counter');
  lbImg.style.transition='opacity 0.18s ease, transform 0.35s ease';

  function openLB(idx){ lbIdx=idx; lbImg.src=found[idx].src; lbCap.textContent=found[idx].label; lbCtr.textContent=(idx+1)+' / '+found.length; lb.classList.add('open'); document.body.style.overflow='hidden'; }
  function closeLB(){ lb.classList.remove('open'); document.body.style.overflow=''; }
  function goLB(dir){ lbIdx=(lbIdx+dir+found.length)%found.length; lbImg.style.opacity='0'; setTimeout(function(){ lbImg.src=found[lbIdx].src; lbCap.textContent=found[lbIdx].label; lbCtr.textContent=(lbIdx+1)+' / '+found.length; lbImg.style.opacity='1'; },180); }

  document.getElementById('lb-close').addEventListener('click',closeLB);
  document.getElementById('lb-prev').addEventListener('click',function(){goLB(-1);});
  document.getElementById('lb-next').addEventListener('click',function(){goLB(1);});
  lb.addEventListener('click',function(e){if(e.target===lb)closeLB();});
  document.addEventListener('keydown',function(e){ if(!lb.classList.contains('open'))return; if(e.key==='Escape')closeLB(); if(e.key==='ArrowLeft')goLB(-1); if(e.key==='ArrowRight')goLB(1); });
  var tx=0;
  lb.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;},{passive:true});
  lb.addEventListener('touchend',function(e){ var diff=tx-e.changedTouches[0].clientX; if(Math.abs(diff)>48)goLB(diff>0?1:-1); });
})();
</script>
</body>
</html>
