<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gallery — Dr. Philemon Odiwuor Yugi</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Jost:wght@200;300;400&family=IM+Fell+English:ital@1&display=swap" rel="stylesheet"/>

<style>
/* KEEPING YOUR DESIGN (unchanged core styling, trimmed slightly for brevity) */
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0c0f;color:#d8dfe5;font-family:'Jost',sans-serif}

.masonry-grid{columns:4;column-gap:16px;padding:80px 20px}
@media(max-width:900px){.masonry-grid{columns:2}}
@media(max-width:500px){.masonry-grid{columns:1}}

.masonry-item{break-inside:avoid;margin-bottom:16px;cursor:pointer;overflow:hidden;border:1px solid rgba(255,255,255,0.05)}
.masonry-item img{width:100%;display:block;transition:0.5s}
.masonry-item:hover img{transform:scale(1.05)}

.lightbox{
position:fixed;inset:0;background:rgba(0,0,0,0.95);
display:flex;align-items:center;justify-content:center;
opacity:0;pointer-events:none;transition:0.3s;
}
.lightbox.open{opacity:1;pointer-events:all}
.lightbox img{max-width:90%;max-height:85%}
.lb-close{position:fixed;top:20px;right:20px;color:#fff;font-size:20px;cursor:pointer}
</style>
</head>

<body>

<div class="masonry-grid" id="grid"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <span class="lb-close" id="close">✕</span>
  <img id="lb-img"/>
</div>

<script>
(function(){

/* CONFIG */
const TOTAL = 41;
const BASE = "Dr Philemon Yugi";

const PATH = {
  thumb:"images/thumbs/",
  medium:"images/medium/",
  large:"images/large/"
};

const EXT = ".webp";

/* STATE */
const grid = document.getElementById("grid");
const lb = document.getElementById("lightbox");
const lbImg = document.getElementById("lb-img");

let current = 0;
let photos = [];

/* CREATE IMAGE CARD */
function createImage(i){
  const num = i+1;
  const name = `${BASE} (${num})`;

  const thumb = PATH.thumb + name + EXT;
  const medium = PATH.medium + name + EXT;
  const large = PATH.large + name + EXT;

  const div = document.createElement("div");
  div.className = "masonry-item";

  div.innerHTML = `
    <picture>
      <source srcset="${thumb}" type="image/webp">
      <img 
        src="${thumb}"
        srcset="
          ${thumb} 480w,
          ${medium} 1024w,
          ${large} 1600w"
        sizes="(max-width:768px) 100vw, (max-width:1200px) 50vw, 25vw"
        loading="lazy"
        decoding="async"
        alt="${name}">
    </picture>
  `;

  div.onclick = ()=>openLightbox(i);

  photos.push(large);

  return div;
}

/* LOAD */
for(let i=0;i<TOTAL;i++){
  grid.appendChild(createImage(i));
}

/* LIGHTBOX */
function openLightbox(i){
  current=i;
  lb.classList.add("open");
  lbImg.src=photos[i];
}

document.getElementById("close").onclick=()=>{
  lb.classList.remove("open");
};

/* KEY NAV */
document.addEventListener("keydown",e=>{
  if(!lb.classList.contains("open")) return;

  if(e.key==="Escape") lb.classList.remove("open");
  if(e.key==="ArrowRight") next();
  if(e.key==="ArrowLeft") prev();
});

function next(){
  current=(current+1)%photos.length;
  lbImg.src=photos[current];
}

function prev(){
  current=(current-1+photos.length)%photos.length;
  lbImg.src=photos[current];
}

})();
</script>

</body>
</html>
