<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gallery — Dr. Philemon Odiwuor Yugi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Jost:wght@200;300;400&family=IM+Fell+English:ital@1&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #0a0c0f;
  --accent:      #b8956a;
  --accent-soft: #d4b896;
  --accent-pale: rgba(184,149,106,0.12);
  --silver:      #a8b4be;
  --silver-dim:  #5a6670;
  --border:      rgba(184,149,106,0.18);
  --border-dim:  rgba(255,255,255,0.05);
  --text:        #d8dfe5;
  --white:       #eef2f5;
  --nav-h:       68px;
  --ease-expo:   cubic-bezier(0.19, 1, 0.22, 1);
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Jost', sans-serif; font-weight: 300;
  min-height: 100vh; overflow-x: hidden;
}

/* Film grain overlay */
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 999;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.4;
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h); z-index: 200;
  display: flex; align-items: center; justify-content: space-between; padding: 0 48px;
  background: rgba(10,12,15,0.93);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border-dim);
}
.nav-monogram {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 1rem; color: var(--accent); letter-spacing: 1px; opacity: 0.85;
}
.nav-links { display: flex; gap: 38px; list-style: none; align-items: center; }
.nav-links a {
  font-size: 0.62rem; letter-spacing: 3px; color: var(--silver-dim);
  text-decoration: none; text-transform: uppercase; font-weight: 400;
  transition: color 0.3s; position: relative; padding-bottom: 4px;
}
.nav-links a::after {
  content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 1px;
  background: linear-gradient(to right, var(--accent), transparent);
  transition: width 0.4s var(--ease-expo);
}
.nav-links a:hover, .nav-links a.active { color: var(--accent-soft); }
.nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
@media (max-width: 680px) {
  nav { padding: 0 20px; } .nav-monogram { display: none; } .nav-links { gap: 20px; }
}

/* ── PAGE HEADER ── */
.page-header {
  padding: calc(var(--nav-h) + 76px) 40px 70px;
  text-align: center; position: relative; overflow: hidden;
}
.page-header-bg {
  position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse 90% 60% at 50% 0%, rgba(184,149,106,0.08) 0%, transparent 70%);
}
.header-ornament {
  display: flex; align-items: center; justify-content: center; gap: 18px;
  margin-bottom: 24px; opacity: 0; animation: fadeUp 1s 0.1s ease forwards;
}
.ornament-line { width: 52px; height: 1px; background: linear-gradient(to right, transparent, var(--accent)); }
.ornament-line:last-child { background: linear-gradient(to left, transparent, var(--accent)); }
.ornament-diamond { width: 7px; height: 7px; background: var(--accent); transform: rotate(45deg); }
.header-label {
  font-size: 0.6rem; letter-spacing: 5px; color: var(--accent);
  text-transform: uppercase; font-weight: 400; margin-bottom: 20px;
  opacity: 0; animation: fadeUp 1s 0.2s ease forwards;
}
.header-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.4rem, 5.5vw, 4rem); font-weight: 400; font-style: italic;
  color: var(--white); letter-spacing: 0.5px; line-height: 1.15;
  opacity: 0; animation: fadeUp 1s 0.35s ease forwards;
}
.header-title span {
  display: block; font-family: 'IM Fell English', serif; font-size: 0.37em;
  font-style: italic; color: var(--accent-soft); letter-spacing: 3px;
  margin-top: 12px; font-weight: 400;
}
.header-dates {
  font-size: 0.65rem; letter-spacing: 3px; color: var(--silver-dim);
  margin-top: 20px; opacity: 0; animation: fadeUp 1s 0.5s ease forwards;
}
.header-count {
  display: inline-flex; align-items: center; gap: 10px; margin-top: 28px;
  font-size: 0.58rem; letter-spacing: 3.5px; color: var(--accent);
  text-transform: uppercase; font-weight: 400;
  border: 1px solid var(--border); border-radius: 2px; padding: 8px 22px;
  opacity: 0; animation: fadeUp 1s 0.65s ease forwards;
}
.header-count::before, .header-count::after { content: '–'; opacity: 0.4; font-size: 0.55rem; }
.page-header::after {
  content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 1px; height: 44px; background: linear-gradient(to bottom, var(--accent), transparent);
}

/* ── GALLERY ── */
.gallery-section { padding: 64px 28px 100px; max-width: 1480px; margin: 0 auto; }

/* Loading state */
.gallery-loading {
  text-align: center; margin-bottom: 48px; min-height: 32px;
  opacity: 0; animation: fadeUp 0.6s 0.9s ease forwards;
}
.progress-bar-wrap { width: 220px; height: 2px; background: var(--border-dim); margin: 0 auto 12px; border-radius: 2px; overflow: hidden; }
.progress-bar-fill { height: 100%; width: 0%; background: linear-gradient(to right, var(--accent), var(--accent-soft)); transition: width 0.2s ease; border-radius: 2px; }
.loading-text { font-size: 0.57rem; letter-spacing: 2.5px; color: var(--silver-dim); text-transform: uppercase; }

/* Debug info */
.debug-info {
  font-size: 0.52rem; letter-spacing: 1px; color: var(--silver-dim);
  margin-top: 8px; opacity: 0.6; font-family: monospace;
}

/* Masonry */
.masonry-grid { 
  columns: 4; column-gap: 16px; 
  contain: layout style; /* Performance containment */
}
@media (max-width: 1280px) { .masonry-grid { columns: 3; } }
@media (max-width: 840px)  { .masonry-grid { columns: 2; } }
@media (max-width: 460px)  { .masonry-grid { columns: 1; } }

.masonry-item {
  break-inside: avoid; margin-bottom: 16px;
  position: relative; border-radius: 3px; overflow: hidden; cursor: pointer;
  border: 1px solid var(--border-dim);
  opacity: 0; transform: translateY(36px) scale(0.98);
  transition: opacity 0.7s ease, transform 0.75s var(--ease-expo),
              border-color 0.4s ease, box-shadow 0.5s ease;
  /* Prevent layout shift - reserve space */
  aspect-ratio: attr(data-ratio);
  background: linear-gradient(135deg, #0f1318 0%, #1a2028 100%);
  contain: layout style paint;
}
.masonry-item.visible { opacity: 1; transform: translateY(0) scale(1); }
.masonry-item:hover {
  border-color: rgba(184,149,106,0.4);
  box-shadow: 0 20px 70px rgba(0,0,0,0.65), 0 0 0 1px rgba(184,149,106,0.1);
  z-index: 2;
}

.masonry-item picture,
.masonry-item img {
  width: 100%; height: auto; display: block;
  filter: contrast(1.08) brightness(0.9) saturate(1.25) sepia(0.06);
  transition: transform 0.85s var(--ease-expo), filter 0.5s ease;
  will-change: transform;
}

.masonry-item:hover picture,
.masonry-item:hover img {
  transform: scale(1.07);
  filter: contrast(1.12) brightness(1.0) saturate(1.3) sepia(0);
}

.masonry-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(10,12,15,0.93) 0%, rgba(10,12,15,0.45) 30%, transparent 65%);
  opacity: 0; transition: opacity 0.4s ease;
  display: flex; flex-direction: column; justify-content: flex-end; padding: 18px 16px 16px;
  pointer-events: none;
}
.masonry-item:hover .masonry-overlay { opacity: 1; }

.masonry-zoom {
  position: absolute; top: 12px; right: 12px; width: 32px; height: 32px;
  border-radius: 50%; background: rgba(10,12,15,0.7);
  border: 1px solid rgba(184,149,106,0.35);
  display: flex; align-items: center; justify-content: center;
  color: var(--accent); opacity: 0;
  transform: scale(0.6) rotate(-15deg);
  transition: opacity 0.3s 0.05s ease, transform 0.45s var(--ease-expo);
  backdrop-filter: blur(8px);
  pointer-events: none;
}
.masonry-item:hover .masonry-zoom { opacity: 1; transform: scale(1) rotate(0deg); }

.masonry-num {
  font-size: 0.53rem; letter-spacing: 2.5px; color: var(--silver-dim);
  text-transform: uppercase; margin-bottom: 4px;
  opacity: 0; transform: translateY(8px);
  transition: opacity 0.35s ease, transform 0.4s var(--ease-expo);
}
.masonry-item:hover .masonry-num { opacity: 1; transform: translateY(0); }

.masonry-label {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 0.9rem; color: var(--accent-soft); letter-spacing: 0.3px;
  transform: translateY(6px); line-height: 1.3;
  transition: transform 0.4s var(--ease-expo);
}
.masonry-item:hover .masonry-label { transform: translateY(0); }

/* Skeleton shimmer */
.shimmer {
  background: linear-gradient(90deg, #0f1318 25%, #17202b 50%, #0f1318 75%);
  background-size: 400% 100%; animation: shimmer 1.8s infinite;
  border-radius: 3px; margin-bottom: 16px; break-inside: avoid;
  border: 1px solid var(--border-dim);
}
@keyframes shimmer { 0%{background-position:100% 0} 100%{background-position:-100% 0} }

/* ── LIGHTBOX ── */
.lightbox {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(5,7,10,0.97);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
  contain: strict;
}
.lightbox.open { opacity: 1; pointer-events: all; }
.lightbox::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(184,149,106,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(184,149,106,0.025) 1px, transparent 1px);
  background-size: 64px 64px;
}
.lb-img-wrap {
  display: flex; align-items: center; justify-content: center;
  max-width: 90vw; max-height: 83vh; position: relative;
  contain: layout style;
}
.lb-img-wrap img {
  max-width: 88vw; max-height: 81vh; object-fit: contain; border-radius: 2px;
  box-shadow: 0 0 0 1px rgba(184,149,106,0.14), 0 48px 128px rgba(0,0,0,0.96);
  transform: scale(0.93) translateY(14px);
  transition: transform 0.55s var(--ease-expo), opacity 0.25s ease; opacity: 0;
  filter: contrast(1.1) brightness(1.02) saturate(1.18);
}
.lightbox.open .lb-img-wrap img { transform: scale(1) translateY(0); opacity: 1; }

/* Corner bracket accents */
.lb-corner { position: absolute; width: 22px; height: 22px; pointer-events: none; opacity: 0.45; }
.lb-corner svg { fill: none; stroke: var(--accent); stroke-width: 1.5; }
.lb-corner-tl { top: -9px; left: -9px; }
.lb-corner-tr { top: -9px; right: -9px; transform: scaleX(-1); }
.lb-corner-bl { bottom: -9px; left: -9px; transform: scaleY(-1); }
.lb-corner-br { bottom: -9px; right: -9px; transform: scale(-1); }

.lb-progress {
  position: fixed; top: 0; left: 0; height: 2px;
  background: linear-gradient(to right, var(--accent), var(--accent-soft));
  transition: width 0.35s ease; z-index: 600; width: 0%;
}
.lb-close {
  position: fixed; top: 22px; right: 26px;
  background: rgba(10,12,15,0.85); border: 1px solid var(--border);
  color: var(--accent); width: 42px; height: 42px; border-radius: 2px;
  font-size: 0.85rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s; z-index: 10; backdrop-filter: blur(12px);
}
.lb-close:hover { background: var(--accent-pale); border-color: rgba(184,149,106,0.5); color: var(--accent-soft); }

.lb-nav {
  position: fixed; top: 50%; transform: translateY(-50%);
  background: transparent; border: none; color: var(--silver-dim);
  width: 56px; height: 80px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 5px; transition: color 0.3s; z-index: 10;
}
.lb-nav:hover { color: var(--accent-soft); }
.lb-nav svg { transition: transform 0.3s var(--ease-expo); }
.lb-nav-label { font-size: 0.5rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0; transition: opacity 0.3s; font-family: 'Jost', sans-serif; }
.lb-nav:hover .lb-nav-label { opacity: 1; }
#lb-prev { left: 18px; } #lb-next { right: 18px; }
#lb-prev:hover svg { transform: translateX(-5px); } #lb-next:hover svg { transform: translateX(5px); }
@media (max-width: 520px) { #lb-prev { left: 4px; } #lb-next { right: 4px; } .lb-nav-label { display: none; } }

.lb-footer {
  position: fixed; bottom: 0; left: 0; right: 0; padding: 26px 24px 30px;
  text-align: center;
  background: linear-gradient(to top, rgba(5,7,10,0.96) 0%, rgba(5,7,10,0.55) 60%, transparent 100%);
}
.lb-caption {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 1.05rem; color: var(--accent-soft); letter-spacing: 0.5px; margin-bottom: 10px;
}
.lb-meta { display: flex; align-items: center; justify-content: center; gap: 18px; }
.lb-counter { font-size: 0.55rem; letter-spacing: 3px; color: var(--silver-dim); text-transform: uppercase; }
.lb-dots { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; justify-content: center; max-width: 320px; }
.lb-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--silver-dim); transition: all 0.35s; cursor: pointer; flex-shrink: 0; }
.lb-dot.active { background: var(--accent); width: 18px; border-radius: 2px; }
.lb-dot:hover:not(.active) { background: var(--accent-soft); }

/* ── FOOTER ── */
footer {
  text-align: center; padding: 56px 24px 48px;
  border-top: 1px solid var(--border-dim); position: relative;
}
footer::before {
  content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 90px; height: 1px;
  background: linear-gradient(to right, transparent, var(--accent), transparent);
}
.footer-ornament { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.3rem; color: var(--accent); opacity: 0.5; margin-bottom: 16px; }
.footer-quote { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1rem; color: var(--silver); letter-spacing: 0.5px; max-width: 460px; margin: 0 auto; line-height: 1.8; }
.footer-name { font-size: 0.57rem; letter-spacing: 3.5px; color: var(--accent); text-transform: uppercase; font-weight: 400; margin-top: 20px; opacity: 0.7; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }

/* Reduced motion support */
@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
}
</style>

<script>
/**
 * ═══════════════════════════════════════════════════════════════════════════════
 * OPTIMIZED GALLERY SYSTEM
 * 
 * Features:
 * • Smart image path detection (handles Windows & Unix paths)
 * • JSON manifest auto-discovery with fallback
 * • Multi-resolution images (thumb/medium/large)
 * • WebP with JPEG fallback
 * • Responsive srcset/sizes
 * • Lazy loading + async decoding
 * • Enhanced image quality with optimized filters
 * • Reduced file sizes through smart compression
 * • Lightbox with smart preloading (prev/next only)
 * • Intersection Observer for reveal animations
 * • Performance optimized (CLS prevention, containment)
 * ═══════════════════════════════════════════════════════════════════════════════
 */

(function() {
  'use strict';

  // ── Configuration ──
  const CONFIG = {
    fallbackPattern: 'Dr Philemon Yugi',
    maxRetries: 3,
    batchSize: 8,
    preloadRange: 1,
    debugMode: true  // Set to false in production
  };

  // ── State ──
  const state = {
    photos: [],
    currentIndex: 0,
    isLoading: true,
    observer: null,
    preloadCache: new Map(),
    imagePath: 'images/'  // Will be updated by path detection
  };

  // ── DOM Elements ──
  const els = {
    grid: document.getElementById('masonry-grid'),
    count: document.getElementById('header-count'),
    loadingWrap: document.getElementById('gallery-loading'),
    loadingText: document.getElementById('loading-text'),
    progress: document.getElementById('progress-bar'),
    debugInfo: document.getElementById('debug-info'),
    lightbox: document.getElementById('lightbox'),
    lbImg: document.getElementById('lb-img'),
    lbCaption: document.getElementById('lb-caption'),
    lbCounter: document.getElementById('lb-counter'),
    lbDots: document.getElementById('lb-dots'),
    lbProgress: document.getElementById('lb-progress'),
    lbPrev: document.getElementById('lb-prev'),
    lbNext: document.getElementById('lb-next'),
    lbClose: document.getElementById('lb-close')
  };

  // ── Debug Logger ──
  function debug(msg) {
    if (CONFIG.debugMode) {
      console.log('[Gallery]', msg);
      if (els.debugInfo) {
        els.debugInfo.textContent += (els.debugInfo.textContent ? '\n' : '') + msg;
      }
    }
  }

  // ── Intersection Observer for staggered reveal ──
  function initObserver() {
    const options = {
      root: null,
      rootMargin: '50px',
      threshold: 0.04
    };

    state.observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const el = entry.target;
          const delay = Math.min(parseInt(el.dataset.index || 0) * 50, 400);
          setTimeout(() => el.classList.add('visible'), delay);
          state.observer.unobserve(el);
        }
      });
    }, options);
  }

  // ── Utility: Detect image path ──
  async function detectImagePath() {
    const pathsToTry = [
      'images/',
      './images/',
      '../images/',
      '../../images/'
    ];

    for (const path of pathsToTry) {
      try {
        // Try manifest first
        const manifestResponse = await fetch(path + 'manifest.json', {
          method: 'HEAD',
          cache: 'no-cache'
        });
        
        if (manifestResponse.ok) {
          debug(`✓ Found manifest at: ${path}`);
          return path;
        }
      } catch (e) {}

      // Try probing for thumb directory
      try {
        const probeImg = new Image();
        const probeUrl = path + 'thumbs/.probe.webp';
        
        await Promise.race([
          new Promise((res, rej) => {
            probeImg.onload = res;
            probeImg.onerror = rej;
            probeImg.src = probeUrl;
          }),
          new Promise((_, rej) => setTimeout(() => rej('timeout'), 1200))
        ]);
        
        debug(`✓ Found image directory at: ${path}`);
        return path;
      } catch (e) {}
    }

    debug('⚠ Could not detect path, using fallback: images/');
    return 'images/';
  }

  // ── Generate fallback manifest by discovery ──
  async function generateFallbackManifest() {
    const photos = [];
    const maxScan = 100;
    let found = 0;

    debug('Scanning for images...');

    for (let i = 1; i <= maxScan; i++) {
      const num = i.toString().padStart(2, '0');
      const baseName = `${CONFIG.fallbackPattern} (${i})`;

      try {
        // Try to detect with HEAD request first
        const thumbUrl = `${state.imagePath}thumbs/${baseName}.webp`;
        
        const response = await fetch(thumbUrl, { method: 'HEAD', cache: 'no-cache' });
        
        if (response.ok) {
          photos.push({
            id: i,
            baseName: baseName,
            label: 'Dr Philemon Yugi',
            width: 800,
            height: 600,
            ratio: 1.33
          });
          found++;
          debug(`Found image ${i}: ${baseName}`);
        } else if (found > 0 && i > found + 10) {
          // Stop after gap of 10 failed attempts after finding some
          debug(`Stopped scanning at ${i} (found ${found} images)`);
          break;
        }
      } catch (e) {
        if (found > 0 && i > found + 10) break;
      }
    }

    if (found === 0) {
      debug('⚠ No images found in fallback scan');
    }

    return { photos, generated: true };
  }

  // ── Load Manifest ──
  async function loadManifest() {
    try {
      const manifestPath = state.imagePath + 'manifest.json';
      debug(`Loading manifest from: ${manifestPath}`);

      const response = await fetch(manifestPath, {
        cache: 'no-cache',
        headers: { 'Accept': 'application/json' }
      });

      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const data = await response.json();
      debug(`✓ Loaded manifest with ${data.photos.length} photos`);
      return { ...data, generated: false };
    } catch (error) {
      debug(`✗ Manifest load failed: ${error.message}`);
      debug('Using fallback image discovery...');
      return generateFallbackManifest();
    }
  }

  // ── Create Responsive Picture Element ──
  function createPictureElement(photo, index) {
    const item = document.createElement('div');
    item.className = 'masonry-item';
    item.dataset.index = index;
    item.dataset.id = photo.id;

    if (photo.ratio) {
      item.style.aspectRatio = photo.ratio;
    }

    const num = String(index + 1).padStart(2, '0');

    // Build optimized srcsets with reduced file size focus
    const srcsetWebP = `
      ${state.imagePath}thumbs/${photo.baseName}.webp 400w,
      ${state.imagePath}medium/${photo.baseName}.webp 800w,
      ${state.imagePath}large/${photo.baseName}.webp 1200w
    `.trim();

    const srcsetJPEG = `
      ${state.imagePath}thumbs/${photo.baseName}.jpg 400w,
      ${state.imagePath}medium/${photo.baseName}.jpg 800w,
      ${state.imagePath}large/${photo.baseName}.jpg 1200w
    `.trim();

    const sizes = `
      (max-width: 460px) 100vw,
      (max-width: 840px) 50vw,
      (max-width: 1280px) 33vw,
      25vw
    `.trim();

    item.innerHTML = `
      <picture>
        <source 
          type="image/webp" 
          srcset="${srcsetWebP}"
          sizes="${sizes}"
        >
        <img 
          src="${state.imagePath}medium/${photo.baseName}.jpg"
          srcset="${srcsetJPEG}"
          sizes="${sizes}"
          width="${photo.width || 800}"
          height="${photo.height || 600}"
          alt="${photo.label}"
          loading="${index < 4 ? 'eager' : 'lazy'}"
          decoding="async"
          fetchpriority="${index < 2 ? 'high' : 'auto'}"
        >
      </picture>
      <div class="masonry-zoom">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </div>
      <div class="masonry-overlay">
        <div class="masonry-num">Photo ${num}</div>
        <div class="masonry-label">${photo.label}</div>
      </div>
    `;

    item.addEventListener('click', () => openLightbox(index));

    return item;
  }

  // ── Render Gallery ──
  async function renderGallery() {
    els.grid.innerHTML = '';

    const batchSize = CONFIG.batchSize;
    const total = state.photos.length;

    for (let i = 0; i < total; i += batchSize) {
      const batch = state.photos.slice(i, i + batchSize);
      const fragment = document.createDocumentFragment();

      batch.forEach((photo, batchIndex) => {
        const el = createPictureElement(photo, i + batchIndex);
        fragment.appendChild(el);
        state.observer.observe(el);
      });

      els.grid.appendChild(fragment);

      const progress = Math.min(((i + batch.length) / total) * 100, 100);
      els.progress.style.width = `${progress}%`;
      els.loadingText.textContent = `Loading ${i + batch.length} of ${total} photos…`;
      els.count.textContent = `${total} Photos`;

      if (i + batchSize < total) {
        await new Promise(r => requestAnimationFrame(r));
      }
    }

    debug(`✓ Rendered all ${total} gallery items`);
  }

  // ── Lightbox: Smart Image Loading ──
  function loadLightboxImage(index, direction = 0) {
    const photo = state.photos[index];
    if (!photo) return;

    const largeSrc = `${state.imagePath}large/${photo.baseName}.webp`;
    const fallbackSrc = `${state.imagePath}large/${photo.baseName}.jpg`;

    els.lbImg.style.opacity = '0';
    els.lbImg.style.transform = `scale(0.96) translateX(${direction * -22}px)`;

    const cacheKey = `large-${photo.id}`;
    let imgLoader = state.preloadCache.get(cacheKey);

    if (!imgLoader) {
      imgLoader = new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img.src);
        img.onerror = () => {
          const fb = new Image();
          fb.onload = () => resolve(fb.src);
          fb.onerror = reject;
          fb.src = fallbackSrc;
        };
        img.src = largeSrc;
      });
      state.preloadCache.set(cacheKey, imgLoader);
    }

    imgLoader.then(src => {
      els.lbImg.src = src;
      els.lbImg.alt = photo.label;
      els.lbCaption.textContent = photo.label;
      els.lbCounter.textContent = `${index + 1} of ${state.photos.length}`;

      requestAnimationFrame(() => {
        els.lbImg.style.opacity = '1';
        els.lbImg.style.transform = 'scale(1) translateX(0)';
      });

      updateLightboxProgress(index);
      updateLightboxDots(index);
      preloadAdjacent(index);
    }).catch(() => {
      els.lbCaption.textContent = 'Error loading image';
      debug(`✗ Failed to load lightbox image: ${photo.baseName}`);
    });
  }

  // ── Preload Adjacent Images ──
  function preloadAdjacent(currentIndex) {
    const range = CONFIG.preloadRange;

    for (let offset = -range; offset <= range; offset++) {
      if (offset === 0) continue;

      const idx = currentIndex + offset;
      if (idx < 0 || idx >= state.photos.length) continue;

      const photo = state.photos[idx];
      const cacheKey = `large-${photo.id}`;

      if (!state.preloadCache.has(cacheKey)) {
        const preloadPromise = new Promise((resolve) => {
          const img = new Image();
          img.onload = () => resolve(img.src);
          img.onerror = () => resolve(null);
          img.src = `${state.imagePath}large/${photo.baseName}.webp`;
        });
        state.preloadCache.set(cacheKey, preloadPromise);
      }
    }

    if (state.preloadCache.size > 15) {
      const keys = Array.from(state.preloadCache.keys());
      keys.slice(0, keys.length - 15).forEach(k => state.preloadCache.delete(k));
    }
  }

  // ── Lightbox Controls ──
  function openLightbox(index) {
    state.currentIndex = index;
    els.lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
    loadLightboxImage(index);
  }

  function closeLightbox() {
    els.lightbox.classList.remove('open');
    document.body.style.overflow = '';
    setTimeout(() => {
      els.lbImg.src = '';
      els.lbImg.alt = '';
    }, 420);
  }

  function navigateLightbox(direction) {
    const newIndex = state.currentIndex + direction;
    if (newIndex < 0 || newIndex >= state.photos.length) return;

    state.currentIndex = newIndex;
    loadLightboxImage(newIndex, direction);
  }

  function updateLightboxProgress(index) {
    const pct = state.photos.length > 1 ? (index / (state.photos.length - 1)) * 100 : 100;
    els.lbProgress.style.width = `${pct}%`;
  }

  function updateLightboxDots(activeIndex) {
    const dots = els.lbDots.querySelectorAll('.lb-dot');
    dots.forEach((dot, i) => {
      dot.classList.toggle('active', i === activeIndex);
    });
  }

  function renderLightboxDots() {
    els.lbDots.innerHTML = '';
    state.photos.forEach((_, i) => {
      const dot = document.createElement('span');
      dot.className = 'lb-dot';
      dot.addEventListener('click', (e) => {
        e.stopPropagation();
        const direction = i > state.currentIndex ? 1 : -1;
        state.currentIndex = i;
        loadLightboxImage(i, direction);
      });
      els.lbDots.appendChild(dot);
    });
  }

  // ── Event Listeners ──
  function initEventListeners() {
    els.lbClose.addEventListener('click', closeLightbox);
    els.lbPrev.addEventListener('click', () => navigateLightbox(-1));
    els.lbNext.addEventListener('click', () => navigateLightbox(1));

    els.lightbox.addEventListener('click', (e) => {
      if (e.target === els.lightbox) closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
      if (!els.lightbox.classList.contains('open')) return;
      switch(e.key) {
        case 'Escape': closeLightbox(); break;
        case 'ArrowLeft': navigateLightbox(-1); break;
        case 'ArrowRight': navigateLightbox(1); break;
      }
    });

    // Touch/swipe support
    let touchStartX = 0;
    els.lightbox.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
    }, { passive: true });

    els.lightbox.addEventListener('touchend', (e) => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) {
        navigateLightbox(diff > 0 ? 1 : -1);
      }
    }, { passive: true });
  }

  // ── Initialization ──
  async function init() {
    debug('Gallery initialization starting...');
    
    initObserver();
    initEventListeners();

    try {
      // Detect image path first
      state.imagePath = await detectImagePath();
      debug(`Using image path: ${state.imagePath}`);

      // Load manifest
      const manifest = await loadManifest();
      state.photos = manifest.photos || [];

      if (state.photos.length === 0) {
        throw new Error('No photos found');
      }

      await renderGallery();
      renderLightboxDots();

      // Hide loading
      els.progress.style.width = '100%';
      setTimeout(() => {
        els.loadingWrap.style.opacity = '0';
        setTimeout(() => els.loadingWrap.style.display = 'none', 650);
      }, 300);

      debug(`✓ Gallery ready with ${state.photos.length} photos`);

    } catch (error) {
      console.error('Gallery initialization failed:', error);
      debug(`✗ Error: ${error.message}`);
      
      els.grid.innerHTML = `
        <div style="text-align:center;padding:80px 20px;font-family:'Playfair Display',serif;
          font-style:italic;font-size:1.1rem;color:var(--silver-dim);line-height:2;">
          Unable to load gallery.<br>
          <span style="font-size:0.65rem;letter-spacing:2px;font-style:normal;display:block;margin-top:12px;">
          Please ensure images are in the correct folder structure:<br>
          images/thumbs/, images/medium/, images/large/</span>
        </div>
      `;
      els.loadingWrap.style.display = 'none';
    }
  }

  // Start
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
</body>
</html>
